<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
<title>Pinned note</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  #card {
    width: 100%;
    height: 100%;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15), 4px 6px 12px rgba(0,0,0,0.4);
    cursor: grab;
    position: relative;
    user-select: none;
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 3px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 4px),
      linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 35%);
    background-blend-mode: multiply, multiply, normal;
  }
  #card.dragging { cursor: grabbing; }
  #card::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 0 14px 14px;
    border-color: transparent transparent rgba(0,0,0,0.18) transparent;
    pointer-events: none;
  }
  #card::before {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 0 12px 12px;
    border-color: transparent transparent rgba(255,255,255,0.35) transparent;
    pointer-events: none;
  }
  #toolbar {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 4px;
  }
  #toolbar button {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #3d2a1f;
    color: #f3e9dc;
    border: none;
    font-size: 15px;
    line-height: 30px;
    text-align: center;
    cursor: pointer;
    padding: 0;
  }
  #toolbar button:hover { background: #54392a; }
  .work-name { font-weight: 700; font-size: 14px; line-height: 1.3; word-break: break-word; }
  .due-date { font-size: 12px; font-weight: 600; }
  .meta-line { font-size: 11px; opacity: 0.85; }
  .operator-tag {
    margin-top: auto;
    font-size: 10px;
    font-weight: 700;
    align-self: flex-start;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(0,0,0,0.12);
  }
  #card.overdue { box-shadow: inset 0 0 0 2px #a6231a; }
  #card.overdue .due-date { color: #a6231a; }
  #card.due-soon { box-shadow: inset 0 0 0 2px #d99a1f, 0 0 6px 1px rgba(217,154,31,0.5); }
</style>
</head>
<body>
<div id="card">
  <div id="toolbar">
    <button id="unpin" title="Unpin from desktop">📌</button>
  </div>
  <div class="work-name" id="f-work-name"></div>
  <div class="due-date" id="f-due-date"></div>
  <div class="meta-line" id="f-requested-by"></div>
  <div class="operator-tag" id="f-operator"></div>
</div>
<script src="pin-widget.js"></script>
</body>
</html>
